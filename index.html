<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicomatic — Calculateur coaxiaux LF</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  h1 { font-size: 1.25rem; font-weight: 500; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 0.5px solid #e0e0da; border-radius: 12px; padding: 1.5rem; max-width: 820px; margin: 0 auto; }
  label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.25rem; }
  .slider-wrap { display: flex; align-items: center; gap: 8px; }
  input[type=range] { flex: 1; accent-color: #444; }
  .val { font-size: 18px; font-weight: 500; min-width: 36px; text-align: right; }
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric { background: #f5f5f3; border-radius: 8px; padding: 0.75rem; }
  .metric .lbl { font-size: 11px; color: #888; margin-bottom: 2px; }
  .metric .num { font-size: 22px; font-weight: 500; }
  .summ { font-size: 13px; color: #666; padding: 0.65rem 0.85rem; background: #f5f5f3; border-radius: 8px; margin-bottom: 1.5rem; line-height: 1.8; }
  .tbl-label { font-size: 11px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .tbl-wrap { overflow-x: auto; border: 0.5px solid #e0e0da; border-radius: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 0.5px solid #e0e0da; }
  th { padding: 8px 10px; font-weight: 500; color: #888; }
  td { padding: 6px 10px; }
  tbody tr { border-bottom: 0.5px solid #f0f0ec; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f5f5f3; }
  tbody tr.selected { background: #e8f0fb; }
  .tr, .num-col { text-align: right; }
  .tc { text-align: center; }
  .muted { color: #aaa; }
  @media (max-width: 520px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="card">
  <h1>Calculateur coaxiaux LF</h1>
  <p class="subtitle">Plages GAUCHE et DROITE HPHF selon nblf et coax gauche choisi</p>

  <div class="row">
    <div>
      <label>nblf</label>
      <div class="slider-wrap">
        <input type="range" id="ns" min="6" max="111" step="3" value="30">
        <span id="nv" class="val">30</span>
      </div>
    </div>
    <div>
      <label>coax gauche yy</label>
      <div class="slider-wrap">
        <input type="range" id="ys" min="2" max="44" step="2" value="2">
        <span id="yv" class="val">2</span>
      </div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="lbl">A</div><div class="num" id="ca"></div></div>
    <div class="metric"><div class="lbl">coax_max</div><div class="num" id="cg"></div></div>
    <div class="metric"><div class="lbl">DROITE min</div><div class="num" id="cdmin"></div></div>
    <div class="metric"><div class="lbl">DROITE max</div><div class="num" id="cdmax"></div></div>
  </div>

  <div id="summ" class="summ"></div>

  <div class="tbl-label">Tableau complet — cliquer une ligne pour sélectionner</div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th class="tr">nblf</th>
          <th class="tr">A</th>
          <th class="tr">coax_max</th>
          <th class="tc">GAUCHE (2 à cm−2)</th>
          <th class="tc">DROITE yy=2 (2 à …)</th>
          <th class="tr"># val. G</th>
          <th class="tr"># val. D</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>

<script>
function calcA(n){ return Math.floor(n*2/3)-2; }
function coaxMax(a){ return Math.floor((75.25-a)/2.5+1)*2; }
function dmaxFn(a,yy){ return Math.floor((72.5-a)/2.5+2)*2 - yy; }
function dminFn(yy){ return Math.max(2, 4-yy); }

let selN = 30;

const tb = document.getElementById('tb');
for(let n=6; n<=111; n+=3){
  const a=calcA(n), cm=coaxMax(a), yyMax=cm-2;
  const ngv = yyMax>=2 ? (yyMax-2)/2+1 : 0;
  const dmn2=dminFn(2), dmx2=dmaxFn(a,2);
  const ndv2 = dmx2>=dmn2 ? Math.floor((dmx2-dmn2)/2)+1 : 0;
  const tr = document.createElement('tr');
  tr.id = 'r'+n;
  tr.innerHTML =
    `<td class="tr" style="font-weight:500">${n}</td>`+
    `<td class="tr">${a}</td>`+
    `<td class="tr">${cm}</td>`+
    `<td class="tc">2 — ${yyMax}</td>`+
    `<td class="tc">${dmn2} — ${dmx2}</td>`+
    `<td class="tr muted">${ngv}</td>`+
    `<td class="tr muted">${ndv2}</td>`;
  tr.addEventListener('click', ()=>{ document.getElementById('ns').value=n; update(); });
  tb.appendChild(tr);
}

function renderSumm(n,a,cm,yy){
  const dmn=dminFn(yy), dmx=dmaxFn(a,yy);
  const yyMax=cm-2;
  const ngv = yyMax>=2 ? (yyMax-2)/2+1 : 0;
  const ndv = dmx>=dmn ? Math.floor((dmx-dmn)/2)+1 : 0;
  document.getElementById('cdmin').textContent = dmn;
  document.getElementById('cdmax').textContent = dmx;
  document.getElementById('summ').innerHTML =
    `nblf = <strong>${n}</strong> &nbsp;→&nbsp; A = <strong>${a}</strong>`+
    `<br>GAUCHE : 2 à <strong>${yyMax}</strong> (pas de 2, <strong>${ngv}</strong> valeur${ngv>1?'s':''})`+
    `<br>DROITE pour yy = <strong>${yy}</strong> : <strong>${dmn}</strong> à <strong>${dmx}</strong> (pas de 2, <strong>${ndv}</strong> valeur${ndv>1?'s':''})`; 
}

function update(){
  const n = parseInt(document.getElementById('ns').value);
  document.getElementById('nv').textContent = n;
  const a=calcA(n), cm=coaxMax(a), yyMax=cm-2;
  document.getElementById('ca').textContent = a;
  document.getElementById('cg').textContent = cm;

  const ys = document.getElementById('ys');
  ys.min=2; ys.max=yyMax;
  let yy = parseInt(ys.value);
  if(yy>yyMax){ yy=yyMax; ys.value=yy; }
  if(yy<2){ yy=2; ys.value=yy; }
  if(yy%2!==0){ yy=Math.max(2,yy-1); ys.value=yy; }
  document.getElementById('yv').textContent = yy;

  renderSumm(n,a,cm,yy);

  if(selN!==n){
    const old = document.getElementById('r'+selN);
    if(old) old.classList.remove('selected');
    selN = n;
  }
  const cur = document.getElementById('r'+n);
  if(cur){ cur.classList.add('selected'); cur.scrollIntoView({block:'nearest'}); }
}

document.getElementById('ns').addEventListener('input', update);
document.getElementById('ys').addEventListener('input', ()=>{
  const n=parseInt(document.getElementById('ns').value);
  const a=calcA(n), cm=coaxMax(a);
  let yy=parseInt(document.getElementById('ys').value);
  if(yy%2!==0){ yy=Math.max(2,yy-1); document.getElementById('ys').value=yy; }
  document.getElementById('yv').textContent=yy;
  renderSumm(n,a,cm,yy);
});

update();
</script>
</body>
</html>
