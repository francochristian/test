<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicomatic — Calculateur coaxiaux LF</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f0ee; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  h1 { font-size: 1.25rem; font-weight: 500; margin-bottom: 0.2rem; }
  .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 1.4rem; }
  .card { background: #fff; border: 0.5px solid #e0e0da; border-radius: 12px; padding: 1.5rem; max-width: 900px; margin: 0 auto; }
  label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 1.25rem; }
  .slider-wrap { display: flex; align-items: center; gap: 8px; }
  input[type=range] { flex: 1; accent-color: #444; touch-action: none; }
  .val { font-size: 18px; font-weight: 500; min-width: 36px; text-align: right; }
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric { background: #f5f5f3; border-radius: 8px; padding: 0.75rem; }
  .metric .lbl { font-size: 11px; color: #888; margin-bottom: 2px; }
  .metric .num { font-size: 22px; font-weight: 500; }
  .summ { font-size: 13px; color: #555; padding: 0.65rem 0.85rem; background: #f5f5f3; border-radius: 8px; margin-bottom: 1.25rem; line-height: 1.9; }
  /* Connector viz */
  .viz-wrap { background: #111; border-radius: 10px; padding: 1rem; margin-bottom: 1.25rem; overflow-x: auto; display: flex; justify-content: center; }
  #cvg { display: block; }
  /* Table */
  .tbl-label { font-size: 11px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .tbl-wrap { border: 0.5px solid #e0e0da; border-radius: 12px; max-height: 340px; overflow-y: auto; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { position: sticky; top: 0; background: #fff; border-bottom: 0.5px solid #e0e0da; z-index: 1; }
  th { padding: 8px 10px; font-weight: 500; color: #888; }
  td { padding: 6px 10px; }
  tbody tr { border-bottom: 0.5px solid #f0f0ec; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f5f5f3; }
  tbody tr.selected { background: #e8f0fb; }
  .tr { text-align: right; }
  .tc { text-align: center; }
  .muted { color: #aaa; }
  @media (max-width: 600px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="card">
  <h1>Calculateur coaxiaux LF</h1>
  <p class="subtitle">Plages GAUCHE et DROITE HPHF selon nblf et coax gauche choisi</p>

  <div class="row">
    <div>
      <label>nblf</label>
      <div class="slider-wrap">
        <input type="range" id="ns" min="6" max="111" step="3" value="12">
        <span id="nv" class="val">12</span>
      </div>
    </div>
    <div>
      <label>coax gauche yy</label>
      <div class="slider-wrap">
        <input type="range" id="ys" min="2" max="44" step="2" value="6">
        <span id="yv" class="val">6</span>
      </div>
    </div>
    <div>
      <label>coax droite zz</label>
      <div class="slider-wrap">
        <input type="range" id="zs" min="2" max="44" step="2" value="6">
        <span id="zv" class="val">6</span>
      </div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="lbl">A</div><div class="num" id="ca"></div></div>
    <div class="metric"><div class="lbl">coax_max</div><div class="num" id="cg"></div></div>
    <div class="metric"><div class="lbl">DROITE min</div><div class="num" id="cdmin"></div></div>
    <div class="metric"><div class="lbl">DROITE max</div><div class="num" id="cdmax"></div></div>
  </div>

  <div id="summ" class="summ"></div>

  <!-- Connector visualization -->
  <div class="viz-wrap">
    <svg id="cvg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="tbl-label">Tableau complet — cliquer une ligne pour sélectionner</div>
  <div class="tbl-wrap" id="tblwrap">
    <table>
      <thead>
        <tr>
          <th class="tr">nblf</th>
          <th class="tr">A</th>
          <th class="tr">coax_max</th>
          <th class="tc">GAUCHE (2 à cm−2)</th>
          <th class="tc">DROITE yy=2 (2 à …)</th>
          <th class="tr"># val. G</th>
          <th class="tr"># val. D</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>

<script>
/* ── Formulas ── */
function calcA(n){ return Math.floor(n*2/3)-2; }
function coaxMax(a){ return Math.floor((75.25-a)/2.5+1)*2; }
function dmaxFn(a,yy){ return Math.floor((72.5-a)/2.5+2)*2-yy; }
function dminFn(yy){ return Math.max(2,4-yy); }

/* ── Table ── */
let selN=12;
const tb=document.getElementById('tb');
for(let n=6;n<=111;n+=3){
  const a=calcA(n),cm=coaxMax(a),yyMax=cm-2;
  const ngv=yyMax>=2?(yyMax-2)/2+1:0;
  const dmn2=dminFn(2),dmx2=dmaxFn(a,2);
  const ndv2=dmx2>=dmn2?Math.floor((dmx2-dmn2)/2)+1:0;
  const tr=document.createElement('tr');
  tr.id='r'+n;
  tr.innerHTML=
    `<td class="tr" style="font-weight:500">${n}</td>`+
    `<td class="tr">${a}</td>`+
    `<td class="tr">${cm}</td>`+
    `<td class="tc">2 — ${yyMax}</td>`+
    `<td class="tc">${dmn2} — ${dmx2}</td>`+
    `<td class="tr muted">${ngv}</td>`+
    `<td class="tr muted">${ndv2}</td>`;
  tr.addEventListener('click',()=>{ document.getElementById('ns').value=n; update(true); });
  tb.appendChild(tr);
}

/* ── Connector drawing ── */
function drawConnector(nblf, yy, zz){
  const svg = document.getElementById('cvg');

  // Constants
  const LF_R=5, LF_PH=16, LF_PV=16;
  const CX_R=12, CX_PH=30, CX_PV=30;
  const BODY_PAD=22, GAP=18, MARG=24;
  const MH_R=11, MH_WING=28; // mounting wing width

  const lf_cols = nblf/3;
  const g_cols  = yy/2;
  const d_cols  = zz/2;

  // Vertical: LF=3 rows, CX=2 rows, center-align
  const lf_span_v = 2*LF_PV;   // 32
  const cx_span_v = 1*CX_PV;   // 30
  const inner_h = Math.max(lf_span_v, cx_span_v);
  const body_h = inner_h + 2*BODY_PAD;
  const lf_y0  = BODY_PAD + (inner_h-lf_span_v)/2;
  const cx_y0  = BODY_PAD + (inner_h-cx_span_v)/2;

  // Horizontal zone widths
  const g_zone_w  = g_cols * CX_PH;
  const lf_zone_w = lf_cols * LF_PH;
  const d_zone_w  = d_cols * CX_PH;
  const body_inner_w = g_zone_w + GAP + lf_zone_w + GAP + d_zone_w;
  const body_w = body_inner_w + 2*BODY_PAD;

  // SVG total size (mounting wings extend beyond body)
  const svgW = MH_WING*2 + body_w + 2*MARG;
  const svgH = body_h + 2*MARG;

  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox',`0 0 ${svgW} ${svgH}`);

  const bx = MARG+MH_WING; // body x start
  const by = MARG;          // body y start
  const bcx = bx+body_w/2; // body center x
  const bcy = by+body_h/2; // body center y

  let h='';

  // ── Shadow
  h+=`<filter id="ds"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/></filter>`;

  // ── Mounting wings (left & right)
  const wingH = body_h*0.72;
  const wingY = by+(body_h-wingH)/2;
  h+=`<rect x="${MARG}" y="${wingY}" width="${MH_WING+8}" height="${wingH}" rx="5" fill="#222" stroke="#444" stroke-width="1"/>`;
  h+=`<rect x="${bx+body_w-8}" y="${wingY}" width="${MH_WING+8}" height="${wingH}" rx="5" fill="#222" stroke="#444" stroke-width="1"/>`;

  // Mounting holes
  const mhLx=MARG+MH_WING/2, mhRx=bx+body_w+MH_WING/2, mhY=bcy;
  // hole outer ring
  h+=`<circle cx="${mhLx}" cy="${mhY}" r="${MH_R}" fill="#1a1a1a" stroke="#666" stroke-width="1.5"/>`;
  h+=`<circle cx="${mhLx}" cy="${mhY}" r="${MH_R*0.55}" fill="#888" stroke="#aaa" stroke-width="1"/>`;
  h+=`<circle cx="${mhLx}" cy="${mhY}" r="${MH_R*0.28}" fill="#ccc"/>`;
  h+=`<circle cx="${mhRx}" cy="${mhY}" r="${MH_R}" fill="#1a1a1a" stroke="#666" stroke-width="1.5"/>`;
  h+=`<circle cx="${mhRx}" cy="${mhY}" r="${MH_R*0.55}" fill="#888" stroke="#aaa" stroke-width="1"/>`;
  h+=`<circle cx="${mhRx}" cy="${mhY}" r="${MH_R*0.28}" fill="#ccc"/>`;

  // ── Body
  h+=`<rect x="${bx}" y="${by}" width="${body_w}" height="${body_h}" rx="5" fill="#1e1e1e" stroke="#555" stroke-width="1.5" filter="url(#ds)"/>`;

  // Zone separators (subtle lines)
  const sepY1=by+6, sepY2=by+body_h-6;
  const sep1x=bx+BODY_PAD+g_zone_w+GAP/2;
  const sep2x=bx+BODY_PAD+g_zone_w+GAP+lf_zone_w+GAP/2;
  h+=`<line x1="${sep1x}" y1="${sepY1}" x2="${sep1x}" y2="${sepY2}" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>`;
  h+=`<line x2="${sep2x}" y1="${sepY1}" x1="${sep2x}" y2="${sepY2}" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>`;

  // ── Left coax contacts
  const gx0 = bx+BODY_PAD+CX_PH/2;
  for(let c=0;c<g_cols;c++){
    const cx=gx0+c*CX_PH;
    for(let r=0;r<2;r++){
      const cy=by+cx_y0+r*CX_PV;
      h+=coaxSVG(cx,cy,CX_R);
    }
  }

  // ── LF contacts
  const lfx0 = bx+BODY_PAD+g_zone_w+GAP+LF_PH/2;
  for(let c=0;c<lf_cols;c++){
    const cx=lfx0+c*LF_PH;
    for(let r=0;r<3;r++){
      const cy=by+lf_y0+r*LF_PV;
      h+=lfSVG(cx,cy,LF_R);
    }
  }

  // ── Right coax contacts
  const dx0 = bx+BODY_PAD+g_zone_w+GAP+lf_zone_w+GAP+CX_PH/2;
  for(let c=0;c<d_cols;c++){
    const cx=dx0+c*CX_PH;
    for(let r=0;r<2;r++){
      const cy=by+cx_y0+r*CX_PV;
      h+=coaxSVG(cx,cy,CX_R);
    }
  }

  // ── Labels
  const lblY=by+body_h+14;
  const lblStyle='font-size:10px;fill:#666;font-family:system-ui,sans-serif;';
  if(g_cols>0){
    const gLblX=gx0+(g_cols-1)*CX_PH/2;
    h+=`<text x="${gLblX}" y="${lblY}" text-anchor="middle" style="${lblStyle}">GAUCHE (${yy})</text>`;
  }
  const lfLblX=lfx0+(lf_cols-1)*LF_PH/2;
  h+=`<text x="${lfLblX}" y="${lblY}" text-anchor="middle" style="${lblStyle}">LF (${nblf})</text>`;
  if(d_cols>0){
    const dLblX=dx0+(d_cols-1)*CX_PH/2;
    h+=`<text x="${dLblX}" y="${lblY}" text-anchor="middle" style="${lblStyle}">DROITE (${zz})</text>`;
  }

  svg.innerHTML=h;
}

function coaxSVG(cx,cy,r){
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#2a2a2a" stroke="#c8a040" stroke-width="1.5"/>
    <circle cx="${cx}" cy="${cy}" r="${r*0.62}" fill="#b07820" stroke="#e8c060" stroke-width="0.8"/>
    <circle cx="${cx}" cy="${cy}" r="${r*0.28}" fill="#fff" opacity="0.9"/>
    <circle cx="${cx-r*0.22}" cy="${cy-r*0.22}" r="${r*0.12}" fill="#fff" opacity="0.5"/>`;
}

function lfSVG(cx,cy,r){
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#c89030" stroke="#e8b040" stroke-width="0.8"/>
    <circle cx="${cx}" cy="${cy}" r="${r*0.45}" fill="#f0d070" opacity="0.8"/>
    <circle cx="${cx-r*0.2}" cy="${cy-r*0.2}" r="${r*0.18}" fill="#fff" opacity="0.5"/>`;
}

/* ── Slider clamp ── */
function clampSlider(el,mn,mx,step){
  el.min=mn; el.max=mx; el.step=step;
  let v=parseInt(el.value);
  if(isNaN(v)||v<mn) v=mn;
  if(v>mx) v=mx;
  v=mn+Math.round((v-mn)/step)*step;
  if(v>mx) v=mx;
  el.value=v;
  return v;
}

/* ── Summary ── */
function renderSumm(n,a,cm,yy,zz){
  const dmn=dminFn(yy),dmx=dmaxFn(a,yy);
  const yyMax=cm-2;
  const ngv=yyMax>=2?(yyMax-2)/2+1:0;
  const ndv=dmx>=dmn?Math.floor((dmx-dmn)/2)+1:0;
  document.getElementById('cdmin').textContent=dmn;
  document.getElementById('cdmax').textContent=dmx;
  document.getElementById('summ').innerHTML=
    `nblf = <strong>${n}</strong> &nbsp;→&nbsp; A = <strong>${a}</strong>`+
    `<br>GAUCHE : 2 à <strong>${yyMax}</strong> (pas de 2, <strong>${ngv}</strong> val.) — choisi : <strong>${yy}</strong>`+
    `<br>DROITE : <strong>${dmn}</strong> à <strong>${dmx}</strong> (pas de 2, <strong>${ndv}</strong> val.) — choisi : <strong>${zz}</strong>`+
    `<br>Total coax HPHF : <strong>${yy+zz}</strong> &nbsp;|&nbsp; Total contacts : <strong>${n+yy+zz}</strong>`;
}

/* ── Main update ── */
function update(fromClick){
  const n=parseInt(document.getElementById('ns').value);
  document.getElementById('nv').textContent=n;
  const a=calcA(n),cm=coaxMax(a),yyMax=cm-2;
  document.getElementById('ca').textContent=a;
  document.getElementById('cg').textContent=cm;

  const yy=clampSlider(document.getElementById('ys'),2,yyMax,2);
  document.getElementById('yv').textContent=yy;

  const dmn=dminFn(yy),dmx=dmaxFn(a,yy);
  const zz=clampSlider(document.getElementById('zs'),dmn,dmx,2);
  document.getElementById('zv').textContent=zz;

  renderSumm(n,a,cm,yy,zz);
  drawConnector(n,yy,zz);

  const old=document.getElementById('r'+selN);
  if(old) old.classList.remove('selected');
  selN=n;
  const cur=document.getElementById('r'+n);
  if(cur){
    cur.classList.add('selected');
    if(fromClick){
      const wrap=document.getElementById('tblwrap');
      wrap.scrollTop=cur.offsetTop-wrap.offsetTop-wrap.clientHeight/2;
    }
  }
}

document.getElementById('ns').addEventListener('input',()=>update(false));
document.getElementById('ys').addEventListener('input',()=>{
  const n=parseInt(document.getElementById('ns').value);
  const a=calcA(n),cm=coaxMax(a),yyMax=cm-2;
  const yy=clampSlider(document.getElementById('ys'),2,yyMax,2);
  document.getElementById('yv').textContent=yy;
  const dmn=dminFn(yy),dmx=dmaxFn(a,yy);
  const zz=clampSlider(document.getElementById('zs'),dmn,dmx,2);
  document.getElementById('zv').textContent=zz;
  renderSumm(n,a,cm,yy,zz);
  drawConnector(n,yy,zz);
});
document.getElementById('zs').addEventListener('input',()=>{
  const n=parseInt(document.getElementById('ns').value);
  const a=calcA(n),cm=coaxMax(a),yyMax=cm-2;
  const yy=clampSlider(document.getElementById('ys'),2,yyMax,2);
  const dmn=dminFn(yy),dmx=dmaxFn(a,yy);
  const zz=clampSlider(document.getElementById('zs'),dmn,dmx,2);
  document.getElementById('zv').textContent=zz;
  renderSumm(n,a,cm,yy,zz);
  drawConnector(n,yy,zz);
});

update(false);
</script>
</body>
</html>
