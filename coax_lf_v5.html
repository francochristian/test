
<h2 class="sr-only">Calculateur coaxiaux LF — GAUCHE 2 à coax_max−2, DROITE min 2</h2>
<div style="padding:1rem 0;">

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem;">
  <div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;">nblf</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <input type="range" id="ns" min="6" max="111" step="3" value="30" style="flex:1;">
      <span id="nv" style="font-size:18px;font-weight:500;min-width:36px;text-align:right;">30</span>
    </div>
  </div>
  <div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;">coax gauche yy</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <input type="range" id="ys" min="2" max="44" step="2" value="2" style="flex:1;">
      <span id="yv" style="font-size:18px;font-weight:500;min-width:36px;text-align:right;">2</span>
    </div>
  </div>
</div>

<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem;">
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">A</div>
    <div id="ca" style="font-size:22px;font-weight:500;"></div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">coax_max</div>
    <div id="cg" style="font-size:22px;font-weight:500;"></div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">DROITE min</div>
    <div id="cdmin" style="font-size:22px;font-weight:500;"></div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">DROITE max</div>
    <div id="cdmax" style="font-size:22px;font-weight:500;"></div>
  </div>
</div>

<div id="summ" style="font-size:13px;color:var(--color-text-secondary);padding:0.65rem 0.85rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:1.5rem;line-height:1.8;"></div>

<div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Tableau complet — cliquer une ligne pour sélectionner</div>
<div style="overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);">
<table style="width:100%;border-collapse:collapse;font-size:13px;">
<thead>
<tr style="border-bottom:0.5px solid var(--color-border-tertiary);">
  <th style="text-align:right;padding:8px 10px;font-weight:500;color:var(--color-text-secondary);">nblf</th>
  <th style="text-align:right;padding:8px 10px;font-weight:500;color:var(--color-text-secondary);">A</th>
  <th style="text-align:right;padding:8px 10px;font-weight:500;color:var(--color-text-secondary);">coax_max</th>
  <th style="text-align:center;padding:8px 10px;font-weight:500;color:var(--color-text-secondary);">GAUCHE (2 à cm−2)</th>
  <th style="text-align:center;padding:8px 10px;font-weight:500;color:var(--color-text-secondary);">DROITE yy=2 (2 à …)</th>
  <th style="text-align:right;padding:8px 10px;font-weight:500;color:var(--color-text-secondary);"># val. G</th>
  <th style="text-align:right;padding:8px 10px;font-weight:500;color:var(--color-text-secondary);"># val. D</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>
<script>
function calcA(n){ return Math.floor(n*2/3)-2; }
function coaxMax(a){ return Math.floor((75.25-a)/2.5+1)*2; }
function dmaxFn(a,yy){ return Math.floor((72.5-a)/2.5+2)*2 - yy; }
function dminFn(yy){ return Math.max(2, 4-yy); }

let selN=30;

const tb=document.getElementById('tb');
for(let n=6;n<=111;n+=3){
  const a=calcA(n), cm=coaxMax(a);
  const yyMax=cm-2;
  const ngv=yyMax>=2?(yyMax-2)/2+1:0;
  const dmn2=dminFn(2), dmx2=dmaxFn(a,2);
  const ndv2=dmx2>=dmn2?Math.floor((dmx2-dmn2)/2)+1:0;
  const tr=document.createElement('tr');
  tr.id='r'+n;
  tr.style.cssText='cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary);';
  tr.innerHTML=
    `<td style="padding:6px 10px;text-align:right;font-weight:500;">${n}</td>`+
    `<td style="padding:6px 10px;text-align:right;">${a}</td>`+
    `<td style="padding:6px 10px;text-align:right;">${cm}</td>`+
    `<td style="padding:6px 10px;text-align:center;">2 — ${yyMax}</td>`+
    `<td style="padding:6px 10px;text-align:center;">${dmn2} — ${dmx2}</td>`+
    `<td style="padding:6px 10px;text-align:right;color:var(--color-text-secondary);">${ngv}</td>`+
    `<td style="padding:6px 10px;text-align:right;color:var(--color-text-secondary);">${ndv2}</td>`;
  tr.addEventListener('mouseover',()=>{ if(tr.id!=='r'+selN) tr.style.background='var(--color-background-secondary)'; });
  tr.addEventListener('mouseout',()=>{ if(tr.id!=='r'+selN) tr.style.background=''; });
  tr.addEventListener('click',()=>{ document.getElementById('ns').value=n; update(); });
  tb.appendChild(tr);
}

function renderSumm(n,a,cm,yy){
  const dmn=dminFn(yy), dmx=dmaxFn(a,yy);
  const yyMax=cm-2;
  const ngv=yyMax>=2?(yyMax-2)/2+1:0;
  const ndv=dmx>=dmn?Math.floor((dmx-dmn)/2)+1:0;
  document.getElementById('cdmin').textContent=dmn;
  document.getElementById('cdmax').textContent=dmx;
  document.getElementById('summ').innerHTML=
    `nblf = <strong style="color:var(--color-text-primary)">${n}</strong> &nbsp;→&nbsp; A = <strong style="color:var(--color-text-primary)">${a}</strong>`+
    `<br>GAUCHE : 2 à <strong style="color:var(--color-text-primary)">${yyMax}</strong> (pas de 2, <strong style="color:var(--color-text-primary)">${ngv}</strong> valeur${ngv>1?'s':''})`+
    `<br>DROITE pour yy = <strong style="color:var(--color-text-primary)">${yy}</strong> : <strong style="color:var(--color-text-primary)">${dmn}</strong> à <strong style="color:var(--color-text-primary)">${dmx}</strong> (pas de 2, <strong style="color:var(--color-text-primary)">${ndv}</strong> valeur${ndv>1?'s':''})`;
}

function update(){
  const n=parseInt(document.getElementById('ns').value);
  document.getElementById('nv').textContent=n;
  const a=calcA(n), cm=coaxMax(a);
  document.getElementById('ca').textContent=a;
  document.getElementById('cg').textContent=cm;

  const ys=document.getElementById('ys');
  const yyMax=cm-2;
  ys.min=2; ys.max=yyMax;
  let yy=parseInt(ys.value);
  if(yy>yyMax){yy=yyMax;ys.value=yy;}
  if(yy<2){yy=2;ys.value=yy;}
  if(yy%2!==0){yy=Math.max(2,yy-1);ys.value=yy;}
  document.getElementById('yv').textContent=yy;

  renderSumm(n,a,cm,yy);

  if(selN!==n){
    const old=document.getElementById('r'+selN);
    if(old){old.style.background='';}
    selN=n;
  }
  const cur=document.getElementById('r'+n);
  if(cur){cur.style.background='var(--color-background-info)';cur.scrollIntoView({block:'nearest'});}
}

document.getElementById('ns').addEventListener('input',update);
document.getElementById('ys').addEventListener('input',()=>{
  const n=parseInt(document.getElementById('ns').value);
  const a=calcA(n), cm=coaxMax(a);
  let yy=parseInt(document.getElementById('ys').value);
  if(yy%2!==0){yy=Math.max(2,yy-1);document.getElementById('ys').value=yy;}
  document.getElementById('yv').textContent=yy;
  renderSumm(n,a,cm,yy);
});
update();
</script>
